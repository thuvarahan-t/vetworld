spring.application.name=VetWorld
server.port=8080
spring.config.import=optional:file:./frontend/.env.local[.properties],optional:file:../frontend/.env.local[.properties],optional:file:../../frontend/.env.local[.properties],optional:file:.env.local[.properties],optional:file:.env[.properties]

# PostgreSQL Datasource
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-1-ap-southeast-2.pooler.supabase.com:6543/postgres?sslmode=require&prepareThreshold=0}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres.oweuckhqssvhmfxiahyh}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${SUPABASE_DB_PASSWORD:${SUPABASE_PASSWORD:}}}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.use_get_generated_keys=true
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
spring.jpa.properties.hibernate.cache.use_query_cache=false

# JWT
app.jwt.secret=vetworld-super-secret-key-for-jwt-authentication-2024
app.jwt.expiration=86400000

# Admin credentials (change in production!)
